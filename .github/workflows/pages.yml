name: Deploy to GitHub Pages

on:
  # Rebuilds run on push to main and on demand only (no schedule): a maintainer
  # triggers "Run workflow" (workflow_dispatch) to refresh the published data.
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Generate app token for reading service repositories
        id: generate_token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ secrets.DASHBOARD_APP_ID }}
          private-key: ${{ secrets.DASHBOARD_APP_KEY }}
          owner: ghga-de
      - uses: actions/checkout@v4
      # Requires Pages to be allowed for the repo/org.
      - uses: actions/configure-pages@v5
      # Build the static payload with the org token. The token exists only in
      # this job (from the DASHBOARD_TOKEN Actions secret) and is never shipped
      # to the browser. ubuntu-latest already has python3; dashboard.py is stdlib
      # only, so no install step is needed.
      - name: Build data.json
        env:
          GH_TOKEN: ${{ steps.generate_token.outputs.token }}
        run: python3 dashboard.py build data.json
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - id: deployment
        uses: actions/deploy-pages@v4
